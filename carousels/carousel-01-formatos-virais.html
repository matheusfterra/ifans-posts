olor:#7A6B9B;letter-spacing:.05em;text-transform:uppercase\">O segredo do algoritmo</span></div>\n  <h2 style=\"font-family:Syne,sans-serif;font-size:60px;font-weight:800;line-height:1.07;color:#FFFFFF;margin-bottom:32px\">O que todos t\u00eam em comum</h2>\n  <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n    <div style=\"background:rgba(68,42,192,.12);border:1.5px solid rgba(68,42,192,.3);border-radius:18px;padding:30px\"><div style=\"font-size:19px;font-weight:700;color:#442AC0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px\">Por que o hook importa</div><p style=\"font-size:28px;color:#FFFFFF;line-height:1.5\">O algoritmo mede quanto tempo o espectador assistiu. Hook forte = mais pessoas chegam ao final = mais distribui\u00e7\u00e3o.</p></div>\n    <div style=\"background:rgba(253,41,108,.08);border:1.5px solid rgba(253,41,108,.3);border-radius:18px;padding:30px\"><div style=\"font-size:19px;font-weight:700;color:#FD296C;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px\">A regra dos 3 segundos</div><p style=\"font-size:28px;color:#FFFFFF;line-height:1.5\">Se o espectador n\u00e3o tiver motivo para continuar no segundo 3, ele vai. Cada formato come\u00e7a no cl\u00edmax, n\u00e3o na apresenta\u00e7\u00e3o.</p></div>\n  </div>\n  <div style=\"margin-top:18px;font-size:20px;color:#3D3260\">3/7</div>\n</div><div style=\"position:absolute;bottom:0;left:0;right:0;height:110px;background:#0D0B1E;border-top:1.5px solid #1E1535;display:flex;align-items:center;justify-content:space-between;padding:0 52px;\"><div style=\"display:flex;align-items:center;gap:14px\"><img src=\"data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0iVVRGLTgiPz4KPCEtLSB2dHJhY2VyIGJhc2Ug4oCUIGxldHJhcyBlc2NhbGEgMS4zeCwgc2ltZXRyaWEgY2VudHJhZGEgbm8gYmFkZ2UgLS0+CjxzdmcgdmVyc2lvbj0iMS4xIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjEwMjQiPgoKCjwhLS0gQkFER0UgVklPTEVUQSAtLT4KPHBhdGggZD0iTTAgMCBDNS41Mj E1535;display:inline-block;margin:0 4px;transition:all .2s\"></span><span style=\"width:10px;height:10px;border-radius:50%;background:#1E1535;display:inline-block;margin:0 4px;transition:all .2s\"></span><span style=\"width:10px;height:10px;border-radius:50%;background:#1E1535;display:inline-block;margin:0 4px;transition:all .2s\"></span><span style=\"width:10px;height:10px;border-radius:50%;background:#1E1535;display:inline-block;margin:0 4px;transition:all .2s\"></span><span style=\"width:28px;height:10px;border-radius:5;background:#442AC0;display:inline-block;margin:0 4px;transition:all .2s\"></span></div><div style=\"font-family:DM Sans,sans-serif;font-size:18px;color:#7A6B9B\">@ifans.click</div></div>"],CAP="\ud83d\udcf2 Os 5 formatos de Reel que mais viralizam \u2014 e por qu\u00ea cada um funciona\n\nO algoritmo n\u00e3o \u00e9 aleat\u00f3rio. Ele distribui o que prende. E esses 5 formatos s\u00e3o os que mais geram reten\u00e7\u00e3o total:\n\n1\ufe0f\u20e3 POV r\u00e1pido (menos de 15s) \u2014 come\u00e7a no cl\u00edmax, sem intro\n2\ufe0f\u20e3 Antes e Depois \u2014 resultado nos 3 primeiros segundos\n3\ufe0f\u20e3 Trend de \u00e1udio com twist \u2014 surfar no algoritmo com personalidade pr\u00f3pria\n4\ufe0f\u20e3 Tutorial rel\u00e2mpago \u2014 3 passos, 30s, valor imediato\n5\ufe0f\u20e3 Opini\u00e3o controversa \u2014 dois campos, muitos coment\u00e1rios, muito alcance\n\nTodos t\u00eam o mesmo DNA: hook forte, sem introdu\u00e7\u00e3o, rea\u00e7\u00e3o emocional garantida.\n\n\ud83d\udcbe Salva esse post para ter os formatos sempre \u00e0 m\u00e3o.\n\n\ud83d\udcac Qual formato voc\u00ea vai testar esta semana?\n\n#ifansclick #reels #criadordecontent #viralizacao #algoritmo #instagram",N=7;
let cur=0;
function scale(){return document.getElementById('fi').parentElement.offsetWidth/1080}
function render(i){
  const fi=document.getElementById('fi');
  fi.innerHTML=S[i];
  fi.style.transform=`scale(${scale()})`;
  document.getElementById('ct').textContent=`Slide ${i+1} de ${N}`;
  document.getElementById('pb').disabled=i===0;
  document.getElementById('nb2').disabled=i===N-1;
  const dr=document.getElementById('dr');dr.innerHTML='';
  for(let j=0;j<N;j++){const d=document.createElement('button');d.className='dot';d.style.width=j===i?'26px':'10px';d.style.background=j===i?'#442AC0':'#1E1535';d.onclick=()=>goTo(j);dr.appendChild(d);}
}
function goTo(i){cur=i;render(cur)}
function go(d){const n=cur+d;if(n>=0&&n<N)goTo(n)}
async function dlCurrent(){
  const btn=document.getElementById('dlb');btn.textContent='⏳...';btn.classList.add('loading');
  const fi=document.getElementById('fi');const pt=fi.style.transform;fi.style.transform='scale(1)';
  try{const c=await html2canvas(fi,{width:1080,height:1350,scale:2,useCORS:true,allowTaint:true,backgroundColor:'#0D0B1E',logging:false});const a=document.createElement('a');a.download=`ifans-carousel-01-formatos-virais-s${cur+1}.png`;a.href=c.toDataURL('image/png');a.click();}catch(e){alert('Erro: '+e.message)}
  fi.style.transform=pt;btn.textContent='⬇ Baixar slide';btn.classList.remove('loading');
}
async function dlAll(){
  const btn=document.getElementById('dla'),pg=document.getElementById('pg'),bar=document.getElementById('pb2');
  btn.textContent='⏳ Exportando...';btn.disabled=true;pg.style.display='block';bar.style.width='0%';
  const fi=document.getElementById('fi');const sv=cur;
  for(let i=0;i<N;i++){
    fi.innerHTML=S[i];fi.style.transform='scale(1)';await new Promise(r=>setTimeout(r,500));
    try{const c=await html2canvas(fi,{width:1080,height:1350,scale:2,useCORS:true,allowTaint:true,backgroundColor:'#0D0B1E',logging:false});const a=document.createElement('a');a.download=`ifans-carousel-01-formatos-virais-s${i+1}.png`;a.href=c.toDataURL('image/png');a.click();await new Promise(r=>setTimeout(r,300));}catch(e){console.error(e)}
    bar.style.width=`${Math.round(((i+1)/N)*100)}%`;
  }
  goTo(sv);setTimeout(()=>pg.style.display='none',2000);btn.textContent='✅ Pronto!';setTimeout(()=>{btn.textContent=`⬇ Baixar todos (${N})`;btn.disabled=false},3000);
}
function copyC(){navigator.clipboard.writeText(CAP).then(()=>{const b=document.getElementById('cpb');b.textContent='✅ Copiado!';b.classList.add('ok');setTimeout(()=>{b.textContent='📋 Copiar';b.classList.remove('ok')},2500)})}
