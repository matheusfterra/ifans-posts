<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ifans.click — Os ganchos que param o scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060410; min-height:100vh; font-family:'DM Sans',sans-serif; color:#fff; }

/* Top nav */
.topnav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:#0D0B1E; border-bottom:1px solid #1E1535; }
.topnav .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
.topnav .brand span { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#442AC0; }
.topnav .brand em { font-family:'Syne',sans-serif; font-weight:700; font-size:18px; color:#fff; font-style:normal; }
.back-btn { display:flex; align-items:center; gap:8px; padding:8px 18px; background:#1E1535; border:none; border-radius:100px; color:#9B8DC0; font-family:'DM Sans',sans-serif; font-size:14px; cursor:pointer; text-decoration:none; transition:all .2s; }
.back-btn:hover { background:#2A1F4A; color:#fff; }

/* Viewer */
.viewer-wrap { max-width:600px; margin:0 auto; padding:24px 16px 40px; }
.slide-title { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:#fff; margin-bottom:8px; line-height:1.3; }
.slide-counter-text { font-size:13px; color:#7A6B9B; margin-bottom:20px; }

/* Slide display */
.slide-outer { position:relative; width:100%; max-width:540px; margin:0 auto; }
.slide-frame { position:relative; width:100%; padding-bottom:125%; overflow:hidden; border-radius:12px; box-shadow:0 8px 40px rgba(68,42,192,0.3); background:#0D0B1E; }
.slide-inner { position:absolute; top:0; left:0; width:1080px; height:1350px; transform-origin:top left; }
.slide-inner * { box-sizing:border-box; }

/* Navigation */
.nav-row { display:flex; align-items:center; justify-content:space-between; margin-top:20px; gap:12px; }
.nav-btn { width:48px; height:48px; border-radius:50%; background:#1E1535; border:none; cursor:pointer; color:#9B8DC0; font-size:22px; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
.nav-btn:hover:not(:disabled) { background:#442AC0; color:#fff; }
.nav-btn:disabled { opacity:0.3; cursor:not-allowed; }
.dots { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; }
.dot { width:10px; height:10px; border-radius:50%; background:#1E1535; cursor:pointer; transition:all .2s; border:none; padding:0; }
.dot.active { background:#442AC0; width:28px; border-radius:5px; }

/* Download btn */
.dl-btn { display:flex; align-items:center; gap:8px; padding:12px 24px; background:linear-gradient(135deg,#442AC0,#FD296C); border:none; border-radius:100px; color:#fff; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .2s; }
.dl-btn:hover { opacity:0.9; }
.dl-btn.loading { opacity:0.6; cursor:wait; }

/* Caption */
.caption-section { margin-top:32px; background:#0D0B1E; border:1.5px solid #1E1535; border-radius:16px; overflow:hidden; }
.caption-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid #1E1535; }
.caption-label { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#7A6B9B; letter-spacing:0.08em; text-transform:uppercase; }
.copy-btn { display:flex; align-items:center; gap:6px; padding:8px 18px; background:#1E1535; border:none; border-radius:100px; color:#9B8DC0; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
.copy-btn:hover { background:#442AC0; color:#fff; }
.copy-btn.copied { background:#22c55e; color:#fff; }
.caption-text { padding:20px; font-size:15px; line-height:1.7; color:#C4B8DC; white-space:pre-wrap; user-select:text; }

/* Download all */
.actions-row { display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; }
.dl-all-btn { flex:1; min-width:200px; display:flex; align-items:center; justify-content:center; gap:8px; padding:14px 24px; background:#1E1535; border:1.5px solid #2A1F4A; border-radius:12px; color:#9B8DC0; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; }
.dl-all-btn:hover { border-color:#442AC0; color:#fff; }

/* Progress bar during export */
.export-progress { display:none; margin-top:12px; background:#1E1535; border-radius:8px; height:6px; overflow:hidden; }
.export-progress .bar { height:100%; background:linear-gradient(90deg,#442AC0,#FD296C); border-radius:8px; width:0%; transition:width .3s; }
</style>
</head>

const CAPTION = "\ud83e\ude9d Os ganchos que param o scroll (com exemplos prontos)\n\nVoc\u00ea tem 3 segundos. \u00c9 o hook ou o esquecimento.\n\nOs 4 tipos que mais funcionam:\n\n\ud83d\udd34 A Amea\u00e7a: \"Isso que todo mundo faz est\u00e1 te destruindo\"\n\ud83c\udfaf A Promessa Espec\u00edfica: \"Em X dias, voc\u00ea vai conseguir Y\"\n\u26a1 A Contradi\u00e7\u00e3o: \"Pare de fazer [coisa \u00f3bvia]. Fa\u00e7a isso.\"\n\ud83d\udc94 A Confiss\u00e3o: \"Eu errei muito at\u00e9 descobrir que...\"\n\nQuanto mais espec\u00edfico o hook, maior a credibilidade \u2014 e mais o algoritmo empurra.\n\n\ud83d\udcac Qual hook voc\u00ea vai usar amanh\u00e3? Cola aqui pra gente avaliar!\n\n#ifansclick #hooks #viralizacao #reels #instagramtips";
const TOTAL = SLIDES.length;
let current = 0;

function getScale() {
  const frame = document.getElementById('slideFrame');
  return frame.offsetWidth / 1080;
}

function render(idx) {
  const inner = document.getElementById('slideInner');
  inner.innerHTML = SLIDES[idx];
  const scale = getScale();
  inner.style.transform = `scale(${scale})`;
  document.getElementById('counterText').textContent = `Slide ${idx+1} de ${TOTAL}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === TOTAL-1;
  updateDots(idx);
}

function updateDots(idx) {
  const row = document.getElementById('dotsRow');
  row.innerHTML = '';
  for (let i=0; i<TOTAL; i++) {
    const d = document.createElement('button');
    d.className = 'dot' + (i===idx ? ' active' : '');
    d.onclick = () => goTo(i);
    row.appendChild(d);
  }
}

function goTo(idx) { current=idx; render(current); }
function changeSlide(dir) {
  const next = current+dir;
  if (next>=0 && next<TOTAL) goTo(next);
}

// Download current slide as PNG
async function downloadCurrentSlide() {
  const btn = document.getElementById('dlBtn');
  btn.textContent = '⏳ Exportando...';
  btn.classList.add('loading');
  try {
    const inner = document.getElementById('slideInner');
    const prevTransform = inner.style.transform;
    inner.style.transform = 'scale(1)';
    const canvas = await html2canvas(inner, {
      width: 1080, height: 1350, scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#0D0B1E', logging: false
    });
    inner.style.transform = prevTransform;
    const link = document.createElement('a');
    link.download = `ifans-carousel-04-hooks-scroll-slide-${current+1}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('Erro ao exportar: ' + e.message); }
  btn.textContent = '⬇ Baixar slide atual';
  btn.classList.remove('loading');
}

// Download all slides
async function downloadAll() {
  const btn = document.getElementById('dlAllBtn');
  const progress = document.getElementById('exportProgress');
  const bar = document.getElementById('exportBar');
  btn.textContent = '⏳ Exportando todos...';
  btn.disabled = true;
  progress.style.display = 'block';
  bar.style.width = '0%';

  const inner = document.getElementById('slideInner');
  const saved = current;
  
  for (let i=0; i<TOTAL; i++) {
    inner.innerHTML = SLIDES[i];
    inner.style.transform = 'scale(1)';
    await new Promise(r => setTimeout(r, 400));
    try {
      const canvas = await html2canvas(inner, {
        width: 1080, height: 1350, scale: 2, useCORS: true, allowTaint: true,
        backgroundColor: '#0D0B1E', logging: false
      });
      const link = document.createElement('a');
      link.download = `ifans-carousel-04-hooks-scroll-slide-${i+1}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      await new Promise(r => setTimeout(r, 200));
    } catch(e) { console.error('Slide', i+1, e); }
    bar.style.width = `${Math.round(((i+1)/TOTAL)*100)}%`;
  }

  goTo(saved);
  bar.style.width = '100%';
  setTimeout(() => { progress.style.display = 'none'; }, 2000);
  btn.textContent = '✅ Download completo!';
  setTimeout(() => { btn.textContent = '⬇ Baixar todos os slides'; btn.disabled = false; }, 3000);
}

function copyCaption() {
  navigator.clipboard.writeText(CAPTION).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar legenda'; btn.classList.remove('copied'); }, 2500);
  });
}

// Init
document.getElementById('captionText').textContent = CAPTION;
render(0);
window.addEventListener('resize', () => {
  const inner = document.getElementById('slideInner');
  inner.style.transform = `scale(${getScale()})`;
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft') changeSlide(-1);
  if (e.key==='ArrowRight') changeSlide(1);
});
