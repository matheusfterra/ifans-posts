<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#060410;min-height:100vh;font-family:'DM Sans',sans-serif;color:#fff;overscroll-behavior:none}
/* TOP NAV */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#0D0B1E;border-bottom:1px solid #1E1535;position:sticky;top:0;z-index:100}
.topnav a{display:flex;align-items:center;gap:8px;text-decoration:none}
.brand-s{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#442AC0}
.brand-e{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#1E1535;border:none;border-radius:100px;color:#9B8DC0;font-size:13px;cursor:pointer;text-decoration:none}
/* STAGE */
.stage{width:100%;touch-action:pan-y;position:relative}
.frame-outer{
  position:relative;
  width:100%;
  /* height set by JS for 1080:1350 ratio */
  overflow:hidden;
  background:#0D0B1E;
}
/* IFRAME — isolated container for slide content */
#fi{
  position:absolute;
  top:0;left:0;
  width:1080px;
  height:1350px;
  border:none;
  transform-origin:top left;
  display:block;
}
/* HIDDEN DIV for html2canvas downloads */
#fi-dl{
  position:fixed;
  left:-4000px;
  top:0;
  width:1080px;
  height:1350px;
  overflow:hidden;
  background:#0D0B1E;
  pointer-events:none;
}
/* NAV ARROWS */
.arr{position:absolute;top:50%;transform:translateY(-50%);z-index:20;width:44px;height:72px;display:flex;align-items:center;justify-content:center;background:rgba(13,11,30,.8);backdrop-filter:blur(6px);border:1px solid rgba(68,42,192,.25);cursor:pointer;user-select:none;transition:background .2s}
.arr:hover{background:rgba(68,42,192,.5)}
.arr.hidden{display:none!important}
.arr-l{left:0;border-radius:0 10px 10px 0;border-left:none}
.arr-r{right:0;border-radius:10px 0 0 10px;border-right:none}
.arr svg{width:20px;height:20px;fill:#fff}
/* INFO ROW */
.info-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
.counter{font-size:12px;color:#7A6B9B}
.dots{display:flex;gap:6px;align-items:center}
.dot{height:8px;border-radius:4px;background:#1E1535;cursor:pointer;border:none;padding:0;transition:all .2s}
/* CAPTION */
.cap-section{margin:10px 14px 0;background:#0D0B1E;border:1.5px solid #1E1535;border-radius:12px;overflow:hidden}
.cap-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
.cap-label{font-size:12px;font-weight:700;color:#7A6B9B;letter-spacing:.06em;text-transform:uppercase}
.cap-tog{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#1E1535;border-radius:8px;color:#9B8DC0;font-size:14px;transition:transform .3s}
.cap-tog.open{transform:rotate(180deg)}
.cap-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.cap-body.open{max-height:500px}
.cap-txt{padding:0 14px 14px;font-size:13px;line-height:1.7;color:#C8BEE0;white-space:pre-line;word-break:break-word}
/* PROGRESS */
.prog-wrap{display:none;padding:0 14px;margin-top:8px}
.prog-track{height:4px;background:#1E1535;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#442AC0,#FD296C);width:0%;transition:width .3s;border-radius:2px}
.prog-lbl{font-size:11px;color:#7A6B9B;margin-top:4px;text-align:center}
/* STICKY ACTION BAR */
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#0D0B1E;border-top:1.5px solid #1E1535;padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px}
.btn-dl{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:0 0;height:48px;background:linear-gradient(135deg,#442AC0,#FD296C);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-dl:hover{opacity:.9}
.btn-dl.loading{opacity:.6;cursor:wait}
.btn-all{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px;height:48px;background:#1E1535;border:1.5px solid #2A1F4A;border-radius:12px;color:#9B8DC0;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-all:hover{border-color:#442AC0;color:#fff}
.btn-copy{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#1E1535;border:1.5px solid #2A1F4A;border-radius:12px;color:#9B8DC0;font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-copy.ok{border-color:#22C55E;color:#22C55E}
.btn-mark{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;height:48px;background:#1E1535;border:1.5px solid #2A1F4A;border-radius:12px;color:#9B8DC0;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-mark.posted{border-color:#22C55E;color:#22C55E;background:#0D2010}
.btn-mark:hover{border-color:#442AC0;color:#fff}
.spacer{height:84px}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:#1A1230;border:1px solid #442AC0;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap;box-shadow:0 4px 20px rgba(68,42,192,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Desktop */
@media(min-width:640px){
  .stage,.info-row,.cap-section,.prog-wrap{max-width:540px;margin-left:auto;margin-right:auto}
  .cap-section{margin:10px auto 0}
  .action-bar{max-width:540px;left:50%;transform:translateX(-50%);border-radius:12px 12px 0 0;border-left:1.5px solid #1E1535;border-right:1.5px solid #1E1535}
}
</style>

/* ── Build complete isolated HTML document for iframe ── */
function buildDoc(html) {
  // Strip font links and style tags from slide (we provide them in iframe head)
  const body = html
    .replace(/<link[^>]*fonts\.googleapis[^>]*>/gi,'')
    .replace(/<link[^>]*fonts\.gstatic[^>]*>/gi,'')
    .replace(/<style[\s\S]*?<\/style>/gi,'');
  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<link rel="preconnect" href="https://fonts.googleapis.com">'
    + '<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">'
    + '<style>*{margin:0;padding:0;box-sizing:border-box}'
    + 'html,body{width:1080px;height:1350px;overflow:hidden;position:relative;background:#0D0B1E;font-family:\'DM Sans\',sans-serif}'
    + '</style></head><body>' + body + '</body></html>';
}

/* ── Scope slide CSS for off-screen download div ── */
function scopeCSS(html) {
  return html.replace(
    /(<style[^>]*>)([\s\S]*?)(<\/style>)/gi,
    function(_, open, css, close) {
      var scoped = css
        .replace(/\*\s*\{/g, '#fi-dl *{')   // scope * reset
        .replace(/body/g,  '#fi-dl')       // scope body
        .replace(/html/g,  '#fi-dl');      // scope html
      return open + scoped + close;
    }
  );
}

/* ── Scale frame-outer height + iframe transform ── */
function applyScale() {
  var fo = document.getElementById('fo');
  var w = fo.offsetWidth || window.innerWidth;
  var scale = w / 1080;
  fo.style.height = Math.round(1350 * scale) + 'px';
  document.getElementById('fi').style.transform = 'scale(' + scale + ')';
}

function updateNav(i) {
  document.getElementById('ct').textContent = 'Slide ' + (i+1) + ' de ' + N;
  document.getElementById('pb').classList.toggle('hidden', i === 0);
  document.getElementById('nb2').classList.toggle('hidden', i === N-1);
  var dr = document.getElementById('dr'); dr.innerHTML = '';
  for (var j=0; j<N; j++) {
    var d = document.createElement('button'); d.className='dot';
    d.style.width = j===i ? '22px' : '8px';
    d.style.background = j===i ? '#442AC0' : '#1E1535';
    d.onclick = (function(idx){ return function(){ goTo(idx); }; })(j);
    dr.appendChild(d);
  }
}

function render(i) {
  document.getElementById('fi').srcdoc = buildDoc(S[i]);
  applyScale();
  updateNav(i);
}

function goTo(i) { cur=i; render(i); }
function go(d) { var n=cur+d; if(n>=0&&n<N) goTo(n); }

function toggleCap() {
  var b=document.getElementById('cap-body'), t=document.getElementById('cap-tog');
  var open=b.classList.toggle('open'); t.classList.toggle('open',open);
}

/* ── Mark as posted (shared localStorage with home gallery) ── */
var CRID = (function(){var m=location.pathname.match(/carousel-[^\/]+/);return m?m[0]:'';})();
var SKEY = 'ifans_posted_v1';
function getPosted(){try{return JSON.parse(localStorage.getItem(SKEY)||'[]');}catch(e){return[];}}
function setPosted(a){localStorage.setItem(SKEY,JSON.stringify(a));}
function isPosted(id){return getPosted().indexOf(id)!==-1;}
function toggleMark(){
  var posted=getPosted();
  var idx=posted.indexOf(CRID);
  if(idx===-1)posted.push(CRID);else posted.splice(idx,1);
  setPosted(posted);
  updateMarkBtn();
  showToast(isPosted(CRID)?'✅ Marcado como postado!':'○ Desmarcado');
}
function updateMarkBtn(){
  var btn=document.getElementById('markb');
  if(!btn)return;
  if(isPosted(CRID)){btn.textContent='✅ Postado';btn.classList.add('posted');}
  else{btn.textContent='○ Marcar postado';btn.classList.remove('posted');}
}
function showToast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500);
}

/* ── Download CURRENT slide (full 1080×1350 via hidden div + html2canvas) ── */
async function dlCurrent() {
  var btn=document.getElementById('dlb');
  btn.textContent='⏳...'; btn.classList.add('loading');
  try {
    var canvas = await captureSlide(cur);
    var a=document.createElement('a');
    a.download='ifans-carousel-05-metricas-importantes-s'+(cur+1)+'.png';
    a.href=canvas.toDataURL('image/png'); a.click();
    showToast('✅ Slide baixado!');
  } catch(e) { showToast('Erro: '+e.message); }
  btn.textContent='⬇ Baixar slide'; btn.classList.remove('loading');
}

/* ── Download ALL slides ── */
async function dlAll() {
  var btn=document.getElementById('dla'), pgw=document.getElementById('pgw'),
      bar=document.getElementById('pb2'), lbl=document.getElementById('pgl');
  btn.textContent='⏳...'; btn.disabled=true; pgw.style.display='block'; bar.style.width='0%';
  for(var i=0;i<N;i++) {
    try {
      var canvas=await captureSlide(i);
      var a=document.createElement('a'); a.download='ifans-carousel-05-metricas-importantes-s'+(i+1)+'.png';
      a.href=canvas.toDataURL('image/png'); a.click();
      await new Promise(function(r){setTimeout(r,300);});
    } catch(e) { console.error(e); }
    bar.style.width=Math.round(((i+1)/N)*100)+'%';
    lbl.textContent='Slide '+(i+1)+' de '+N+' exportado';
  }
  setTimeout(function(){pgw.style.display='none';},2500);
  btn.textContent='✅ Pronto!'; showToast('✅ '+N+' slides baixados!');
  setTimeout(function(){btn.textContent='⬇ Todos (7)';btn.disabled=false;},3000);
}


/* ── Transform slide HTML for reliable html2canvas capture ── */
function downloadTransform(html) {
  var scoped = html.replace(
    /(<style[^>]*>)([\s\S]*?)(<\/style>)/gi,
    function(_, open, css, close) {
      return open + css
        .replace(/\*\s*\{/g, '#fi-dl *{')   // scope * reset to #fi-dl
        .replace(/\bhtml\b/g, '#fi-dl')      // scope html
        .replace(/\bbody\b/g, '.slide-root') // scope body → .slide-root (fixing % calc)
        + close;
    }
  );
  // Wrap in .slide-root so height:calc(100% - Npx) resolves to 1350px, not viewport
  return '<div class="slide-root" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:#0D0B1E;font-family:\'DM Sans\',sans-serif;">' + scoped + '</div>';
}

/* ── Capture slide to canvas via off-screen div ── */

/* ── Pre-load external images as base64 data URIs (fixes CORS in html2canvas) ── */
async function preloadImages(html) {
  var imgRe = /(<img[^>]*?)src="(https?:\/\/[^"]+)"([^>]*?>)/gi;
  var matches = [];
  var m;
  while ((m = imgRe.exec(html)) !== null) {
    matches.push({ original: m[0], pre: m[1], url: m[2], post: m[3] });
  }
  if (!matches.length) return html;
  var dataUrls = await Promise.all(matches.map(function(r) {
    return fetch(r.url, { mode: 'cors', cache: 'reload' })
      .then(function(resp) { return resp.blob(); })
      .then(function(blob) {
        return new Promise(function(resolve) {
          var reader = new FileReader();
          reader.onload = function() { resolve(reader.result); };
          reader.readAsDataURL(blob);
        });
      })
      .catch(function() { return null; });
  }));
  var result = html;
  matches.forEach(function(r, i) {
    if (dataUrls[i]) {
      result = result.split(r.original).join(
        r.pre + 'src="' + dataUrls[i] + '"' + r.post
      );
    }
  });
  return result;
}

async function captureSlide(i) {
  var rawHtml=await preloadImages(S[i]);
  var dlDiv=document.getElementById('fi-dl');
  dlDiv.innerHTML=downloadTransform(rawHtml);
  // Position above viewport so user can't see it; left:0 keeps geometry clean
  dlDiv.setAttribute('style','position:fixed;left:0;top:-1400px;pointer-events:none;background:transparent;');
  await new Promise(function(r){setTimeout(r,600);});
  // Capture .slide-root: position:relative + explicit 1350px → calc(100%) = 1350px ✓
  var slideRoot=dlDiv.querySelector('.slide-root');
  var canvas=await html2canvas(slideRoot,{
    scale:1,
    useCORS:true,allowTaint:true,
    backgroundColor:'#0D0B1E',logging:false
  });
  dlDiv.innerHTML='';
  return canvas;
}

updateMarkBtn();

function copyC() {
  navigator.clipboard.writeText(CAP).then(function(){
    var b=document.getElementById('cpb'); b.textContent='✅'; b.classList.add('ok');
    showToast('📋 Legenda copiada!');
    setTimeout(function(){b.textContent='📋';b.classList.remove('ok');},2500);
  });
}

/* ── Init ── */
document.getElementById('capTxt').textContent=CAP;
requestAnimationFrame(function(){ render(0); });
window.addEventListener('resize', applyScale);

/* ── Touch swipe ── */
var tx=0;
var stage=document.getElementById('stage');
stage.addEventListener('touchstart',function(e){tx=e.changedTouches[0].clientX;},{passive:true});
stage.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>40) go(dx<0?1:-1);
},{passive:true});
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')go(-1);if(e.key==='ArrowRight')go(1);});
