<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts Preview — ifans.click</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D0B1E;
      color: #F0EDF8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 32px 40px 28px;
      border-bottom: 1px solid rgba(68, 42, 192, 0.25);
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #442AC0, #FD296C);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 1.2;
    }

    .header-text h1 span { color: #FD296C; }

    .header-text p {
      font-size: 13px;
      color: #A89DC8;
      margin-top: 2px;
    }

    .header-count {
      margin-left: auto;
      font-size: 13px;
      color: rgba(253, 41, 108, 0.8);
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      padding: 36px 40px;
    }

    /* ── Card ── */
    .card {
      background: #151326;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(68, 42, 192, 0.18);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .card:hover {
      border-color: rgba(68, 42, 192, 0.55);
      box-shadow: 0 8px 32px rgba(68, 42, 192, 0.2);
      transform: translateY(-3px);
    }

    /* ── Thumbnail ── */
    .thumb-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: #0f0d22;
    }

    .spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      background: #0f0d22;
      transition: opacity 0.3s;
    }

    .spinner::after {
      content: '';
      width: 28px;
      height: 28px;
      border: 3px solid rgba(68, 42, 192, 0.2);
      border-top-color: #442AC0;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .thumb-wrap iframe {
      width: 1080px;
      height: 1350px;
      border: none;
      display: block;
      pointer-events: none;
      transform-origin: top left;
    }

    /* ── Card footer ── */
    .card-footer {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-num {
      font-size: 11px;
      font-weight: 600;
      color: #FD296C;
      background: rgba(253, 41, 108, 0.1);
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 12px;
      font-weight: 500;
      color: #C8C0E0;
      line-height: 1.4;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-open {
      font-size: 18px;
      color: #6B5FA0;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .card:hover .card-open { color: #FD296C; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      header { padding: 20px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; }

      .card:hover { transform: none; }
      .card:active { transform: scale(0.97); }

      .card-footer { padding: 10px 12px; }
      .card-title { font-size: 11px; }
      .card-num { font-size: 10px; }
      .card-open { font-size: 15px; }
    }

    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">iF</div>
  <div class="header-text">
    <h1>ifans<span>.click</span> — Posts</h1>
    <p>Preview de todos os carrosseis</p>
  </div>
  <div class="header-count" id="header-count"></div>
</header>

<div class="grid" id="grid"></div>

<script>
const posts = [
  { n: '01', title: 'Os 5 formatos de Reel que mais viralizam AGORA', file: 'carousels/carousel-01-formatos-virais.html' },
  { n: '02', title: 'Por que seu conteúdo não engaja (e o que fazer hoje)', file: 'carousels/carousel-02-erros-engajamento.html' },
  { n: '03', title: 'De 0 a criador monetizado: o roadmap honesto', file: 'carousels/carousel-03-roadmap-monetizacao.html' },
  { n: '04', title: 'Os ganchos que param o scroll (com templates reais)', file: 'carousels/carousel-04-hooks-scroll.html' },
  { n: '05', title: 'As métricas que realmente importam pra crescer', file: 'carousels/carousel-05-metricas-importantes.html' },
];

document.getElementById('header-count').textContent = posts.length + ' posts';

const grid = document.getElementById('grid');

posts.forEach(p => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = p.file;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';

  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'thumb-wrap';

  const spinner = document.createElement('div');
  spinner.className = 'spinner';

  const iframe = document.createElement('iframe');
  iframe.src = p.file;
  iframe.title = p.title;
  iframe.setAttribute('loading', 'lazy');
  iframe.setAttribute('scrolling', 'no');

  iframe.addEventListener('load', () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      const style = doc.createElement('style');
      style.textContent = 'html,body{margin:0!important;padding:0!important;overflow:hidden!important;background:#0D0B1E!important;}';
      doc.head.appendChild(style);
    } catch(e) {}

    spinner.style.opacity = '0';
    setTimeout(() => spinner.style.display = 'none', 300);
    scaleIframe();
  });

  thumbWrap.appendChild(spinner);
  thumbWrap.appendChild(iframe);

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.innerHTML = `
    <span class="card-num">#${p.n}</span>
    <span class="card-title">${p.title}</span>
    <span class="card-open">&#8599;</span>
  `;

  a.appendChild(thumbWrap);
  a.appendChild(footer);
  grid.appendChild(a);

  function scaleIframe() {
    const w = thumbWrap.offsetWidth;
    const scale = w / 1080;
    iframe.style.transform = 'scale(' + scale + ')';
    thumbWrap.style.height = Math.round(1350 * scale) + 'px';
  }

  window.addEventListener('resize', scaleIframe);
  scaleIframe();
});
</script>

</body>
</html>
