<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ifans.click — Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060410; min-height: 100vh; font-family: 'DM Sans', sans-serif; color: #fff; }
header { padding: 20px 24px; background: #0D0B1E; border-bottom: 1px solid #1E1535; display: flex; align-items: center; gap: 12px; }
.brand-badge { width: 44px; height: 44px; background: linear-gradient(135deg, #442AC0, #FD296C); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: #fff; flex-shrink: 0; }
.brand-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
.brand-title span { color: #442AC0; }
.brand-sub { font-size: 13px; color: #7A6B9B; margin-top: 2px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 32px 24px; max-width: 1400px; margin: 0 auto; }
.card { background: #0D0B1E; border: 1.5px solid #1E1535; border-radius: 16px; overflow: hidden; transition: border-color .2s, transform .2s, box-shadow .2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
.card:hover { border-color: #442AC0; transform: translateY(-3px); box-shadow: 0 12px 40px rgba(68,42,192,0.3); }
.thumb-wrap { position: relative; width: 100%; padding-bottom: 125%; background: #0D0B1E; overflow: hidden; }
.thumb-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(6,4,16,0.3); opacity: 0; transition: opacity .2s; }
.card:hover .play-overlay { opacity: 1; }
.play-icon { width: 52px; height: 52px; background: linear-gradient(135deg,#442AC0,#FD296C); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.card-body { padding: 16px 18px 18px; }
.card-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: rgba(68,42,192,0.15); border: 1px solid rgba(68,42,192,0.3); border-radius: 100px; font-size: 11px; font-weight: 700; color: #442AC0; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
.card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; line-height: 1.35; color: #fff; margin-bottom: 12px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; }
.slides-count { font-size: 12px; color: #7A6B9B; }
.open-btn { display: flex; align-items: center; gap: 6px; padding: 7px 16px; background: linear-gradient(135deg,#442AC0,#FD296C); border-radius: 100px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: #fff; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px 12px; } .card-body { padding: 12px 14px 14px; } .card-title { font-size: 13px; } }
@media (max-width: 380px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <div class="brand-badge">iF</div>
  <div>
    <div class="brand-title"><span>ifans</span>.click — Posts</div>
    <div class="brand-sub">Conteúdo para criadores digitais</div>
  </div>
</header>
<div class="grid" id="grid"></div>
<script>
const POSTS = [
  { id: 'carousel-01-formatos-virais', title: 'Os 5 formatos de Reel que mais viralizam', tag: 'Formatos', slides: 7, cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/covers/capa-01-formatos-virais.png' },
  { id: 'carousel-02-erros-engajamento', title: 'Por que seu conteúdo não engaja', tag: 'Erros', slides: 7, cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/covers/capa-02-erros-engajamento.png' },
  { id: 'carousel-03-roadmap-monetizacao', title: 'De 0 a criador monetizado: o roadmap honesto', tag: 'Monetização', slides: 7, cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/covers/capa-03-roadmap-monetizacao.png' },
  { id: 'carousel-04-hooks-scroll', title: 'Os ganchos que param o scroll', tag: 'Hooks', slides: 7, cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/covers/capa-04-hooks-scroll.png' },
  { id: 'carousel-05-metricas-importantes', title: 'As métricas que realmente importam', tag: 'Métricas', slides: 7, cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/covers/capa-05-metricas-importantes.png' }
];
const grid = document.getElementById('grid');
POSTS.forEach(post => {
  const card = document.createElement('a');
  card.href = `carousels/${post.id}.html`;
  card.className = 'card';
  card.innerHTML = `<div class="thumb-wrap"><img class="thumb-cover" src="${post.cover}"><div class="play-overlay"><div class="play-icon">▶</div></div></div><div class="card-body"><div class="card-tag">📱 ${post.tag}</div><div class="card-title">${post.title}</div><div class="card-meta"><span class="slides-count">${post.slides} slides</span><div class="open-btn">Ver + baixar →</div></div></div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
