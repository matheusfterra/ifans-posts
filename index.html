<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iFans — Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060410; min-height: 100vh; font-family: 'DM Sans', sans-serif; color: #fff; }

/* HEADER */
header { padding: 20px 24px 16px; background: #0D0B1E; border-bottom: 1px solid #1E1535; }
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.brand-badge { width: 44px; height: 44px; background: linear-gradient(135deg, #442AC0, #FD296C); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: #fff; flex-shrink: 0; }
.brand-info { flex: 1; }
.brand-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
.brand-title .accent { color: #442AC0; }
.brand-title .viral { color: #FD296C; }
.brand-sub { font-size: 13px; color: #7A6B9B; margin-top: 2px; }

/* STATS */
.stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-pill { display: flex; align-items: center; gap: 6px; padding: 5px 12px; background: rgba(255,255,255,0.05); border: 1px solid #1E1535; border-radius: 100px; font-size: 12px; color: #9B8FC0; }
.stat-pill strong { color: #fff; font-weight: 700; }
.stat-pill.posted { border-color: rgba(68,192,100,0.3); background: rgba(68,192,100,0.08); color: #5EC87A; }
.stat-pill.posted strong { color: #5EC87A; }
.stat-pill.click-pill { border-color: rgba(68,42,192,0.4); background: rgba(68,42,192,0.1); color: #8B7FD0; }
.stat-pill.click-pill strong { color: #8B7FD0; }
.stat-pill.virals-pill { border-color: rgba(253,41,108,0.4); background: rgba(253,41,108,0.1); color: #FD5A8A; }
.stat-pill.virals-pill strong { color: #FD5A8A; }

/* FILTER BAR */
.filter-bar { display: flex; gap: 8px; padding: 14px 24px; border-bottom: 1px solid #1E1535; background: #0D0B1E; flex-wrap: wrap; align-items: center; }
.filter-divider { width: 1px; height: 24px; background: #1E1535; margin: 0 4px; flex-shrink: 0; }
.filter-btn { padding: 7px 18px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; border: 1.5px solid #1E1535; background: transparent; color: #7A6B9B; cursor: pointer; transition: all .2s; white-space: nowrap; }
.filter-btn.active { background: linear-gradient(135deg, #442AC0, #6B3FE0); border-color: transparent; color: #fff; }
.filter-btn:not(.active):hover { border-color: #442AC0; color: #9B8FD4; }
.filter-btn[data-filter="ifans.click"].active { background: linear-gradient(135deg, #3320A0, #5530C8); border-color: transparent; color: #fff; }
.filter-btn[data-filter="ifans.click"]:not(.active):hover { border-color: #442AC0; color: #8B7FD0; }
.filter-btn[data-filter="ifans.virals"].active { background: linear-gradient(135deg, #C01050, #FD296C); border-color: transparent; color: #fff; }
.filter-btn[data-filter="ifans.virals"]:not(.active):hover { border-color: #FD296C; color: #FD5A8A; }

/* PROFILE LABEL IN FILTER */
.filter-label { font-size: 11px; color: #4A3B6B; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

/* GRID */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 32px 24px; max-width: 1400px; margin: 0 auto; }

/* CARD */
.card-wrap { position: relative; }
.card { background: #0D0B1E; border: 1.5px solid #1E1535; border-radius: 16px; overflow: hidden; transition: border-color .2s, transform .2s, box-shadow .2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
.card:hover { border-color: #442AC0; transform: translateY(-3px); box-shadow: 0 12px 40px rgba(68,42,192,0.3); }
.card-wrap.is-posted .card { border-color: rgba(68,192,100,0.4); }
.card-wrap.is-posted .card:hover { border-color: #5EC87A; box-shadow: 0 12px 40px rgba(68,192,100,0.2); }
.card-wrap[data-profile="ifans.virals"] .card:hover { border-color: #FD296C; box-shadow: 0 12px 40px rgba(253,41,108,0.3); }

/* THUMB */
.thumb-wrap { position: relative; width: 100%; padding-bottom: 125%; background: #0D0B1E; overflow: hidden; }
.thumb-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(6,4,16,0.3); opacity: 0; transition: opacity .2s; }
.card:hover .play-overlay { opacity: 1; }
.play-icon { width: 52px; height: 52px; background: linear-gradient(135deg,#442AC0,#FD296C); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.card-wrap[data-profile="ifans.virals"] .play-icon { background: linear-gradient(135deg,#C01050,#FD296C); }

/* REEL badge (video duration) */
.reel-duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.75); border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.03em; }

/* PROFILE BADGE */
.profile-badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: lowercase; z-index: 10; }
.profile-badge.click { background: rgba(68,42,192,0.85); color: #C0B4FF; border: 1px solid rgba(68,42,192,0.8); }
.profile-badge.virals { background: rgba(200,16,80,0.85); color: #FFB0C8; border: 1px solid rgba(253,41,108,0.6); }

/* POSTED BADGE */
.posted-badge { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; background: #1A3D2B; border: 2px solid #5EC87A; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 16px; z-index: 10; }
.card-wrap.is-posted .posted-badge { display: flex; }

/* CARD BODY */
.card-body { padding: 16px 18px 14px; }
.card-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: rgba(68,42,192,0.15); border: 1px solid rgba(68,42,192,0.3); border-radius: 100px; font-size: 11px; font-weight: 700; color: #7060D0; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
.card-wrap[data-profile="ifans.virals"] .card-tag { background: rgba(253,41,108,0.12); border-color: rgba(253,41,108,0.3); color: #FD6090; }
.card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; line-height: 1.35; color: #fff; margin-bottom: 12px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.slides-count { font-size: 12px; color: #7A6B9B; }
.open-btn { display: flex; align-items: center; gap: 6px; padding: 7px 16px; background: linear-gradient(135deg,#442AC0,#FD296C); border-radius: 100px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: #fff; }

/* CAPTION BUTTON */
.caption-btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 8px 0; border-radius: 10px; border: 1.5px solid rgba(253,41,108,0.3); background: rgba(253,41,108,0.07); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: #FD5A8A; cursor: pointer; transition: all .2s; margin-top: 2px; }
.caption-btn:hover { border-color: #FD296C; color: #fff; background: rgba(253,41,108,0.15); }

/* MARK BUTTON */
.mark-btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 9px 0; border-radius: 10px; border: 1.5px solid #1E1535; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: #7A6B9B; cursor: pointer; transition: all .2s; margin-top: 2px; }
.mark-btn:hover { border-color: #5EC87A; color: #5EC87A; background: rgba(68,192,100,0.06); }
.card-wrap.is-posted .mark-btn { border-color: rgba(68,192,100,0.4); color: #5EC87A; background: rgba(68,192,100,0.08); }
.card-wrap.is-posted .mark-btn:hover { background: rgba(68,192,100,0.04); color: #9B8FC0; border-color: #1E1535; }

/* ARCHIVE BUTTON */
.archive-btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 8px 0; border-radius: 10px; border: 1.5px solid #1E1535; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: #4A3B6B; cursor: pointer; transition: all .2s; margin-top: 4px; }
.archive-btn:hover { border-color: rgba(253,41,108,0.4); color: #FD5A8A; background: rgba(253,41,108,0.06); }
.card-wrap.is-archived .archive-btn { border-color: rgba(253,41,108,0.3); color: #FD5A8A; background: rgba(253,41,108,0.07); }
.card-wrap.is-archived .archive-btn:hover { border-color: #1E1535; color: #4A3B6B; background: transparent; }
.card-wrap.is-archived .card { opacity: 0.45; filter: grayscale(0.4); }
.card-wrap.is-archived .card:hover { opacity: 0.7; filter: none; }
.stat-pill.archived-pill { border-color: rgba(253,41,108,0.25); background: rgba(253,41,108,0.07); color: #FD5A8A; }
.stat-pill.archived-pill strong { color: #FD5A8A; }

/* EMPTY STATE */
.empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; text-align: center; color: #7A6B9B; }
.empty-state.visible { display: flex; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; color: #4A3B6B; margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: #5A4B7B; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1E1535; border: 1px solid #442AC0; border-radius: 100px; padding: 12px 24px; font-size: 14px; font-weight: 600; color: #fff; z-index: 2000; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s; opacity: 0; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.posted { border-color: #5EC87A; }

/* CAPTION MODAL — mobile-safe copy */
.cmodal { position: fixed; inset: 0; z-index: 3000; display: flex; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.75); opacity: 0; pointer-events: none; transition: opacity .2s; }
.cmodal.open { opacity: 1; pointer-events: all; }
.cmodal-inner { width: 100%; max-width: 560px; background: #0D0B1E; border: 1.5px solid #1E1535; border-radius: 20px 20px 0 0; padding: 20px 20px 32px; }
.cmodal-label { font-size: 12px; font-weight: 700; color: #7A6B9B; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.cmodal-textarea { width: 100%; height: 160px; background: #060410; border: 1.5px solid #2A1F4A; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; padding: 12px 14px; resize: none; outline: none; }
.cmodal-textarea:focus { border-color: #442AC0; }
.cmodal-actions { display: flex; gap: 10px; margin-top: 12px; }
.cmodal-copy { flex: 1; padding: 12px 0; border-radius: 100px; background: linear-gradient(135deg,#442AC0,#FD296C); border: none; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
.cmodal-close-btn { padding: 12px 20px; border-radius: 100px; background: rgba(255,255,255,0.07); border: 1.5px solid #1E1535; color: #9B8FC0; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
@media (min-width: 560px) { .cmodal { align-items: center; } .cmodal-inner { border-radius: 20px; } }

/* VIDEO MODAL */
.vmodal { position: fixed; inset: 0; z-index: 1500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.92); opacity: 0; pointer-events: none; transition: opacity .25s; }
.vmodal.open { opacity: 1; pointer-events: all; }
.vmodal-inner { position: relative; width: 100%; max-width: 420px; max-height: 90vh; display: flex; flex-direction: column; align-items: center; }
.vmodal-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 4px 10px; }
.vmodal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: #fff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 12px; }
.vmodal-close { width: 36px; height: 36px; border: none; background: rgba(255,255,255,0.1); border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s; }
.vmodal-close:hover { background: rgba(255,255,255,0.2); }
.vmodal video { width: 100%; max-height: calc(90vh - 100px); border-radius: 12px; background: #000; display: block; }
.vmodal-actions { display: flex; gap: 10px; margin-top: 12px; width: 100%; }
.vmodal-btn { flex: 1; padding: 10px 0; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
.vmodal-btn.download { background: rgba(255,255,255,0.1); color: #fff; }
.vmodal-btn.download:hover { background: rgba(255,255,255,0.18); }
.vmodal-btn.caption { background: rgba(253,41,108,0.2); color: #FD5A8A; border: 1px solid rgba(253,41,108,0.3); }
.vmodal-btn.caption:hover { background: rgba(253,41,108,0.3); color: #fff; }
@media (max-width: 480px) { .vmodal-inner { max-width: 100%; padding: 0 12px; } }

/* RESPONSIVE */
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px 12px; }
  .card-body { padding: 12px 14px 12px; }
  .card-title { font-size: 13px; }
  .open-btn { padding: 6px 12px; font-size: 11px; }
  .stats-row { gap: 8px; }
  .filter-bar { padding: 12px 12px; gap: 6px; }
  .filter-btn { padding: 6px 14px; font-size: 12px; }
  .filter-divider { display: none; }
}
@media (max-width: 380px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand-badge">iF</div>
    <div class="brand-info">
      <div class="brand-title"><span class="accent">ifans</span><span style="color:#7A6B9B">.click</span> &amp; <span class="viral">ifans</span><span style="color:#7A6B9B">.virals</span></div>
      <div class="brand-sub">Conteúdo para criadores digitais</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-pill"><strong id="stat-total">0</strong> posts</div>
    <div class="stat-pill click-pill"><strong id="stat-click">0</strong> ifans.click</div>
    <div class="stat-pill virals-pill"><strong id="stat-virals">0</strong> ifans.virals</div>
    <div class="stat-pill posted"><strong id="stat-posted">0</strong> postados</div>
    <div class="stat-pill archived-pill"><strong id="stat-archived">0</strong> arquivados</div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Status</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Todos</button>
  <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">A postar</button>
  <button class="filter-btn" data-filter="posted" onclick="setFilter('posted')">Postados</button>
  <button class="filter-btn" data-filter="archived" onclick="setFilter('archived')">🗄 Arquivados</button>
  <div class="filter-divider"></div>
  <span class="filter-label">Perfil</span>
  <button class="filter-btn" data-filter="ifans.click" onclick="setFilter('ifans.click')">ifans.click</button>
  <button class="filter-btn" data-filter="ifans.virals" onclick="setFilter('ifans.virals')">ifans.virals</button>
</div>

<div id="grid-container">
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">📭</div>
    <div class="empty-title">Nada aqui ainda</div>
    <div class="empty-sub" id="empty-sub">Nenhum post encontrado neste filtro.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- CAPTION MODAL — mobile-safe -->
<div class="cmodal" id="cmodal" onclick="if(event.target===this)closeCaptionModal()">
  <div class="cmodal-inner" onclick="event.stopPropagation()">
    <div class="cmodal-label">📋 Legenda — selecione e copie</div>
    <textarea class="cmodal-textarea" id="cmodal-text" readonly></textarea>
    <div class="cmodal-actions">
      <button class="cmodal-copy" onclick="doCaptionCopy()">Copiar legenda</button>
      <button class="cmodal-close-btn" onclick="closeCaptionModal()">Fechar</button>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="vmodal" id="vmodal" onclick="if(event.target===this)closeModalDirect()">
  <div class="vmodal-inner" onclick="event.stopPropagation()">
    <div class="vmodal-header">
      <div class="vmodal-title" id="vmodal-title"></div>
      <button class="vmodal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <video id="vmodal-video" controls playsinline preload="metadata"></video>
    <div class="vmodal-actions">
      <button class="vmodal-btn download" id="vmodal-dl" onclick="downloadVideo()">⬇ Baixar</button>
      <button class="vmodal-btn caption" id="vmodal-cap" onclick="copyModalCaption()" style="display:none">📋 Copiar legenda</button>
    </div>
  </div>
</div>

<script>
/* ---- DATA ---- */
/* REGRA: todo post deve ter 'profile' (ifans.click | ifans.virals) e 'type' (carousel | reel).
   ifans.click = carrosséis de conteúdo educativo.
   ifans.virals = reels com overlay de alerta viral.
   Para adicionar: (1) colocar arquivo em carousels/ ou fazer upload do MP4 no S3,
   (2) adicionar entrada neste array com profile e type corretos,
   (3) atualizar posts.json, (4) push para main. */

  {

  },
  {

    file: 'carousels/carousel-02-erros-engajamento.html'
  },
  {
    id: 'carousel-03-roadmap-monetizacao',
    profile: 'ifans.click',
    type: 'carousel',
    title: 'De 0 a criador monetizado: o roadmap honesto',
    tag: 'Monetizacao',
    slides: 7,

    file: 'carousels/carousel-03-roadmap-monetizacao.html'
  },
  {
    id: 'carousel-04-hooks-scroll',
    profile: 'ifans.click',
    type: 'carousel',
    title: 'Os ganchos que param o scroll (com templates reais)',
    tag: 'Copywriting',

    date: '2026-07-11',
    cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/covers/capa-04-hooks-scroll.png',
    file: 'carousels/carousel-04-hooks-scroll.html'
  },
  {
    id: 'carousel-05-metricas-importantes',
    profile: 'ifans.click',
    type: 'carousel',
    title: 'As métricas que realmente importam pra crescer',
    tag: 'Analytics',
    slides: 7,
    date: '2026-07-11',
    cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/covers/capa-05-metricas-importantes.png',
    file: 'carousels/carousel-05-metricas-importantes.html'
  },
  {
    id: 'reel-DJ_7mZkN5M8-overlay-v9',
    profile: 'ifans.virals',
    type: 'reel',
    title: 'Reel viral com overlay Alerta de Vídeo Viral',
    tag: 'Viral',
    duration_s: 10.38,
    date: '2026-07-13',
    cover: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/reels/covers/DJ_7mZkN5M8-overlay-v9-cover.png',
    video_url: 'https://s3.us-east-1.amazonaws.com/cdn.digital-ai.tech/uploads/media-cortex/ifans/reel-frame/DJ_7mZkN5M8-overlay-v9.mp4'

/* ---- STORAGE ---- */
const STORAGE_KEY = 'ifans_posted_v1';
const ARCHIVE_KEY = 'ifans_archived_v1';
function getPosted() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }
function setPosted(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
function isPosted(id) { return getPosted().indexOf(id) !== -1; }
function togglePosted(id) {
  var posted = getPosted();
  var idx = posted.indexOf(id);
  if (idx === -1) posted.push(id); else posted.splice(idx, 1);
  setPosted(posted);
}
function getArchived() { try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]'); } catch(e) { return []; } }
function setArchived(arr) { localStorage.setItem(ARCHIVE_KEY, JSON.stringify(arr)); }
function isArchived(id) { return getArchived().indexOf(id) !== -1; }
function toggleArchived(id) {
  var archived = getArchived();
  var idx = archived.indexOf(id);
  if (idx === -1) archived.push(id); else archived.splice(idx, 1);
  setArchived(archived);
}

/* ---- FILTER ---- */
var currentFilter = 'all';
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.filter === f);
  });
  applyFilter();
}
function applyFilter() {
  var wraps = document.querySelectorAll('.card-wrap');
  var visible = 0;
  wraps.forEach(function(wrap) {
    var id = wrap.dataset.id;
    var profile = wrap.dataset.profile;
    var posted = isPosted(id);
    var archived = isArchived(id);
    var show = false;
    if (currentFilter === 'archived') show = archived;
    else if (archived) show = false; // archived items hidden in all other filters
    else if (currentFilter === 'all') show = true;
    else if (currentFilter === 'posted') show = posted;
    else if (currentFilter === 'pending') show = !posted;
    else if (currentFilter === 'ifans.click') show = profile === 'ifans.click';
    else if (currentFilter === 'ifans.virals') show = profile === 'ifans.virals';
    wrap.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  var empty = document.getElementById('empty-state');
  var grid = document.getElementById('grid');
  if (visible === 0) {
    empty.classList.add('visible');
    grid.style.display = 'none';
    var sub = document.getElementById('empty-sub');
    if (currentFilter === 'archived') sub.textContent = 'Nenhum conteúdo arquivado ainda.';
    else if (currentFilter === 'posted') sub.textContent = 'Nenhum post marcado como postado ainda.';
    else if (currentFilter === 'pending') sub.textContent = 'Todos os posts já foram postados!';
    else if (currentFilter === 'ifans.click') sub.textContent = 'Nenhum post para ifans.click ainda.';
    else if (currentFilter === 'ifans.virals') sub.textContent = 'Nenhum reel para ifans.virals ainda.';
    else sub.textContent = 'Nenhum post encontrado.';
  } else {
    empty.classList.remove('visible');
    grid.style.display = '';
  }
}

/* ---- STATS ---- */
function updateStats() {
  var posted = getPosted();
  var clickCount = POSTS.filter(function(p) { return p.profile === 'ifans.click'; }).length;
  var viralsCount = POSTS.filter(function(p) { return p.profile === 'ifans.virals'; }).length;
  var archived = getArchived();
  document.getElementById('stat-total').textContent = POSTS.length;
  document.getElementById('stat-click').textContent = clickCount;
  document.getElementById('stat-virals').textContent = viralsCount;
  document.getElementById('stat-posted').textContent = posted.length;
  document.getElementById('stat-archived').textContent = archived.length;
}

/* ---- UPDATE CARD ---- */
function updateCard(id) {
  var wrap = document.querySelector('.card-wrap[data-id="' + id + '"]');
  if (!wrap) return;
  var posted = isPosted(id);
  var archived = isArchived(id);
  wrap.classList.toggle('is-posted', posted);
  wrap.classList.toggle('is-archived', archived);
  var btn = wrap.querySelector('.mark-btn');
  if (btn) btn.textContent = posted ? '✅ Postado — clique para desmarcar' : '○ Marcar como postado';
  var abtn = wrap.querySelector('.archive-btn');
  if (abtn) abtn.textContent = archived ? '📂 Arquivado — clique para restaurar' : '🗄 Arquivar (não vou postar)';
}

/* ---- ARCHIVE HANDLER ---- */
function handleArchive(e, id) {
  e.preventDefault();
  e.stopPropagation();
  toggleArchived(id);
  updateCard(id);
  updateStats();
  applyFilter();
  showToast(isArchived(id) ? '🗄 Arquivado!' : '📂 Restaurado!', false);
}

/* ---- MARK HANDLER ---- */
function handleMark(e, id) {
  e.preventDefault();
  e.stopPropagation();
  togglePosted(id);
  updateCard(id);
  updateStats();
  applyFilter();
  showToast(isPosted(id) ? '✅ Marcado como postado!' : '○ Desmarcado', isPosted(id));
}

/* ---- CAPTION MODAL (mobile-safe) ---- */
function openCaptionModal(caption) {
  var ta = document.getElementById('cmodal-text');
  ta.value = caption;
  document.getElementById('cmodal').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(function() { ta.focus(); ta.select(); }, 120);
}
function closeCaptionModal() {
  document.getElementById('cmodal').classList.remove('open');
  document.body.style.overflow = '';
}
function doCaptionCopy() {
  var ta = document.getElementById('cmodal-text');
  ta.select();
  ta.setSelectionRange(0, 99999);
  var ok = false;
  try {
    ok = document.execCommand('copy');
  } catch(e) {}
  if (!ok && navigator.clipboard) {
    navigator.clipboard.writeText(ta.value).then(function() {
      showToast('📋 Legenda copiada!', true);
      closeCaptionModal();
    });
    return;
  }
  showToast(ok ? '📋 Legenda copiada!' : '⚠️ Selecione e copie manualmente', ok);
  if (ok) closeCaptionModal();
}
/* ---- COPY CAPTION (entry point) ---- */
function copyCaption(e, caption) {
  e.preventDefault();
  e.stopPropagation();
  openCaptionModal(caption);
}

/* ---- TOAST ---- */
var toastTimer;
function showToast(msg, isGood) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isGood ? ' posted' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = 'toast'; }, 2400);
}

/* ---- VIDEO MODAL ---- */
var _modalCaption = '';
function openModal(videoUrl, title, caption) {
  var modal = document.getElementById('vmodal');
  var video = document.getElementById('vmodal-video');
  var titleEl = document.getElementById('vmodal-title');
  var dlBtn = document.getElementById('vmodal-dl');
  var capBtn = document.getElementById('vmodal-cap');
  titleEl.textContent = title || '';
  video.src = videoUrl;
  dlBtn.dataset.url = videoUrl;
  _modalCaption = caption || '';
  capBtn.style.display = caption ? '' : 'none';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('vmodal')) return;
  var modal = document.getElementById('vmodal');
  var video = document.getElementById('vmodal-video');
  modal.classList.remove('open');
  video.pause();
  video.src = '';
  document.body.style.overflow = '';
}
function closeModalDirect() {
  var modal = document.getElementById('vmodal');
  var video = document.getElementById('vmodal-video');
  modal.classList.remove('open');
  video.pause();
  video.src = '';
  document.body.style.overflow = '';
}
function downloadVideo() {
  var url = document.getElementById('vmodal-dl').dataset.url;
  if (!url) return;
  var btn = document.getElementById('vmodal-dl');
  btn.textContent = '⬇ Baixando...';
  btn.disabled = true;
  fetch(url)
    .then(function(r) { return r.blob(); })
    .then(function(blob) {
      var blobUrl = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = blobUrl;
      a.download = url.split('/').pop();
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 8000);
      btn.textContent = '⬇ Baixar vídeo';
      btn.disabled = false;
    })
    .catch(function() {
      window.open(url, '_blank');
      btn.textContent = '⬇ Baixar vídeo';
      btn.disabled = false;
    });
}
function copyModalCaption() {
  if (!_modalCaption) return;
  closeModalDirect();
  setTimeout(function() { openCaptionModal(_modalCaption); }, 200);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModalDirect();
});
// fix modal close button (calls closeModalDirect instead)
document.addEventListener('DOMContentLoaded', function() {
  var closeBtn = document.querySelector('.vmodal-close');
  if (closeBtn) closeBtn.onclick = closeModalDirect;
});

/* ---- FORMAT DURATION ---- */
function fmtDuration(secs) {
  var m = Math.floor(secs / 60);
  var s = Math.round(secs % 60);
  return (m > 0 ? m + ':' : '') + (s < 10 ? '0' : '') + s + (m === 0 ? 's' : '');
}

/* ---- RENDER CARDS ---- */
var grid = document.getElementById('grid');
POSTS.slice().sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); }).forEach(function(post) {
  var posted = isPosted(post.id);
  var isReel = post.type === 'reel';
  var isVirals = post.profile === 'ifans.virals';

  var archived = isArchived(post.id);
  var wrap = document.createElement('div');
  wrap.className = 'card-wrap' + (posted ? ' is-posted' : '') + (archived ? ' is-archived' : '');
  wrap.dataset.id = post.id;
  wrap.dataset.profile = post.profile;

  /* profile badge */
  var profileBadgeClass = isVirals ? 'virals' : 'click';
  var profileBadgeLabel = isVirals ? '🔥 ifans.virals' : '📱 ifans.click';

  /* meta info: slides vs duration */
  var metaLabel = isReel
    ? '🎬 Reel · ' + fmtDuration(post.duration_s || 0)
    : post.slides + ' slides';

  /* link/action: reel → openModal(); carousel → local html */
  var cardOnclick = '';
  var cardHref, cardTarget;
  if (isReel) {
    var escapedTitle = post.title.replace(/'/g, "\\'");
    var escapedCaption = (post.caption || '').replace(/'/g, "\\'").replace(/\n/g, '\\n');
    cardHref = 'javascript:void(0)';
    cardOnclick = ' onclick="openModal(\'' + (post.video_url || '') + '\',\'' + escapedTitle + '\',\'' + escapedCaption + '\')"';
    cardTarget = '';
  } else {
    cardHref = post.file || ('carousels/' + post.id + '.html');
    cardOnclick = '';
    cardTarget = '';
  }

  /* open btn label */
  var openBtnLabel = isReel ? '▶ Assistir' : 'Ver + baixar →';

  var captionBtn = (isReel && post.caption)
    ? '<button class="caption-btn" onclick="copyCaption(event,' + JSON.stringify(post.caption) + ')">📋 Copiar legenda</button>'
    : '';

  wrap.innerHTML =
    '<div class="profile-badge ' + profileBadgeClass + '">' + profileBadgeLabel + '</div>' +
    '<div class="posted-badge">✅</div>' +
    '<a class="card" href="' + cardHref + '"' + cardOnclick + cardTarget + '>' +
      '<div class="thumb-wrap">' +
        '<img class="thumb-cover" src="' + (post.cover || '') + '" loading="lazy" alt="' + post.title + '" onerror="this.style.background=\'#1E1535\'">' +
        '<div class="play-overlay"><div class="play-icon">' + (isReel ? '▶' : '◀▶') + '</div></div>' +
        (isReel ? '<div class="reel-duration">' + (post.max_views ? (Math.round(post.max_views/1e6) + 'M views') : fmtDuration(post.duration_s || 0)) + '</div>' : '') +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-tag">' + (isReel ? '🎬' : '📄') + ' ' + post.tag + '</div>' +
        '<div class="card-title">' + post.title + '</div>' +
        '<div class="card-meta">' +
          '<span class="slides-count">' + metaLabel + '</span>' +
          '<div class="open-btn">' + openBtnLabel + '</div>' +
        '</div>' +
      '</div>' +
    '</a>' +
    captionBtn +
    '<button class="mark-btn" onclick="handleMark(event,\'' + post.id + '\')">' +
      (posted ? '✅ Postado — clique para desmarcar' : '○ Marcar como postado') +
    '</button>' +
    '<button class="archive-btn" onclick="handleArchive(event,\'' + post.id + '\')">' +
      (archived ? '📂 Arquivado — clique para restaurar' : '🗄 Arquivar (não vou postar)') +
    '</button>';

  grid.appendChild(wrap);
});

/* ---- INIT ---- */
updateStats();
applyFilter();
</script>
</body>
</html>
